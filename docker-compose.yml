      SPRING_DATASOURCE_USERNAME: ${CERTIFICATES_DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${CERTIFICATES_DB_PASSWORD:-postgres}
      SPRING_FLYWAY_TABLE: flyway_schema_history_certificates
