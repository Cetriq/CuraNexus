      SPRING_DATASOURCE_USERNAME: ${CURANEXUS_DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${CURANEXUS_DB_PASSWORD:-postgres}
      SPRING_FLYWAY_TABLE: flyway_schema_history_referral
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8091
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-curanexus}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-curanexus}
    ports:
