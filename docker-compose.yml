      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-curanexus}
    ports:
      - "8096:8096"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8096/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3
    networks:
