version: '3.8'

services:
  # =============================================================================
  # RabbitMQ Message Broker
  # =============================================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: curanexus-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-curanexus}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-curanexus}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - curanexus-network

  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: curanexus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    command: postgres -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - curanexus-network

  # =============================================================================
  # A1 - Patient Module
  # =============================================================================
  patient:
    image: curanexus/patient:latest
    container_name: curanexus-patient
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: patient
    environment:
      SPRING_DATASOURCE_URL: ${CURANEXUS_DB_URL:-jdbc:postgresql://postgres:5432/curanexus}
      SPRING_DATASOURCE_USERNAME: ${CURANEXUS_DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${CURANEXUS_DB_PASSWORD:-postgres}
      SPRING_FLYWAY_TABLE: flyway_schema_history_patient
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - curanexus-network

  # =============================================================================
  # A2 - Care Encounter Module
  # =============================================================================
  care-encounter:
    image: curanexus/care-encounter:latest
    container_name: curanexus-care-encounter
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: care-encounter
    environment:
      SPRING_DATASOURCE_URL: ${CURANEXUS_DB_URL:-jdbc:postgresql://postgres:5432/curanexus}
      SPRING_DATASOURCE_USERNAME: ${CURANEXUS_DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${CURANEXUS_DB_PASSWORD:-postgres}
      SPRING_FLYWAY_TABLE: flyway_schema_history_encounter
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-curanexus}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-curanexus}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - curanexus-network

  # =============================================================================
  # A3 - Journal Module
  # =============================================================================
