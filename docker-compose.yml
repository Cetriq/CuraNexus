  # =============================================================================
  # E1 - Integration/Gateway Module
  # =============================================================================
  integration:
    image: curanexus/integration:latest
    container_name: curanexus-integration
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: integration
    environment:
      SERVER_PORT: 8085
      PATIENT_SERVICE_URL: ${PATIENT_SERVICE_URL:-http://patient:8080}
      ENCOUNTER_SERVICE_URL: ${ENCOUNTER_SERVICE_URL:-http://care-encounter:8081}
      JOURNAL_SERVICE_URL: ${JOURNAL_SERVICE_URL:-http://journal:8082}
      TASK_SERVICE_URL: ${TASK_SERVICE_URL:-http://task:8083}
      AUTHORIZATION_SERVICE_URL: ${AUTHORIZATION_SERVICE_URL:-http://authorization:8084}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification:8088}
      BOOKING_SERVICE_URL: ${BOOKING_SERVICE_URL:-http://booking:8089}
      MEDICATION_SERVICE_URL: ${MEDICATION_SERVICE_URL:-http://medication:8090}
      REFERRAL_SERVICE_URL: ${REFERRAL_SERVICE_URL:-http://referral:8091}
      LAB_SERVICE_URL: ${LAB_SERVICE_URL:-http://lab:8092}
      FORMS_SERVICE_URL: ${FORMS_SERVICE_URL:-http://forms:8093}
      CERTIFICATES_SERVICE_URL: ${CERTIFICATES_SERVICE_URL:-http://certificates:8094}
      CONSENT_SERVICE_URL: ${CONSENT_SERVICE_URL:-http://consent:8095}
      AUDIT_SERVICE_URL: ${AUDIT_SERVICE_URL:-http://audit:8096}
    ports:
      - "8085:8085"
    depends_on:
      - patient
      - care-encounter
      - journal
      - task
      - authorization
      - audit
      - triage
      - notification
      - booking
      - medication
      - referral
      - lab
      - forms
      - certificates
      - consent
    networks:
      - curanexus-network

  # =============================================================================
  # Frontend
  # =============================================================================
  frontend:
    image: curanexus/frontend:latest
    container_name: curanexus-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - patient
      - care-encounter
      - journal
      - task
      - booking
      - medication
      - referral
      - lab
    networks:
      - curanexus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Development Tools
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: curanexus-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@curanexus.se}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - curanexus-network
    profiles:
      - dev

# =============================================================================
# Networks
# =============================================================================
networks:
  curanexus-network:
    driver: bridge
    name: curanexus-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: curanexus-postgres-data
  pgadmin_data:
    name: curanexus-pgadmin-data
  rabbitmq_data:
    name: curanexus-rabbitmq-data
