spring:
  application:
    name: task-module
  datasource:
    url: jdbc:postgresql://localhost:5432/curanexus
    username: curanexus
    password: curanexus
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
