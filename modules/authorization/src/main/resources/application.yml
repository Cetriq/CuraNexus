spring:
  application:
    name: authorization-module
  datasource:
    url: jdbc:postgresql://localhost:5432/curanexus
    username: curanexus
    password: curanexus
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history_authorization
  security:
    user:
      name: admin
      password: admin

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
