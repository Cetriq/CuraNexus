spring:
  application:
    name: curanexus-triage

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/curanexus_triage}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history_triage

server:
  port: ${SERVER_PORT:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Triage configuration
triage:
  decision-support:
    enabled: true
  auto-escalation:
    enabled: true
    check-interval-minutes: 5
  priority-levels:
    - name: IMMEDIATE
      max-wait-minutes: 0
      color: RED
    - name: EMERGENT
      max-wait-minutes: 15
      color: ORANGE
    - name: URGENT
      max-wait-minutes: 60
      color: YELLOW
    - name: LESS_URGENT
      max-wait-minutes: 120
      color: GREEN
    - name: NON_URGENT
      max-wait-minutes: 240
      color: BLUE
