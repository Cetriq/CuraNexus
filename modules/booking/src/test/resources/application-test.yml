spring:
  datasource:
    url: jdbc:tc:postgresql:15:///booking_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

logging:
  level:
    se.curanexus: DEBUG
    org.springframework.transaction: DEBUG
