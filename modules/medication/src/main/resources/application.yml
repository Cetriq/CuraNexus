spring:
  application:
    name: medication-service
  datasource:
    url: jdbc:postgresql://localhost:5432/curanexus_medication
    username: curanexus
    password: curanexus
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history_medication
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Fass API Integration (REQ-MED-021)
# Requires agreement with Lif (fass@lif.se)
# Documentation: https://api.fass.se/documentation
curanexus:
  fass:
    enabled: ${FASS_ENABLED:false}
    base-url: ${FASS_BASE_URL:https://api.fass.se}
    api-key: ${FASS_API_KEY:}
    client-id: ${FASS_CLIENT_ID:}
    client-secret: ${FASS_CLIENT_SECRET:}
    connect-timeout: 10s
    read-timeout: 30s
    cache-ttl: 15m
