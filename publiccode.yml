description:
  sv:
    shortDescription: Modulär vårdgivarplattform för svenska hälso- och sjukvården med FHIR-stöd och PDL-kompatibel audit-loggning
    longDescription: CuraNexus är en processorienterad vårdplattform som tillhandahåller patientidentitetshantering, vårdmöten, klinisk dokumentation, triagering enligt RETTS och arbetsflödeshantering för svenska vårdgivare.
    features:
      - FHIR R4-kompatibel API
      - RETTS-inspirerad triagering
      - PDL-kompatibel audit-loggning
      - Modulär mikroservicearkitektur
      - Rollbaserad auktorisering (RBAC/ABAC)
      - Klinisk dokumentation och journalföring
