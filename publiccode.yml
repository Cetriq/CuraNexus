description:
  sv:
    shortDescription: Modulär svenskanpassad vårdgivarplattform för hantering av patientdata och vårdprocesser
    longDescription: CuraNexus är en komplett vårdgivarplattform byggd för svenska vårdgivare med stöd för patientidentitet, vårdmöten, klinisk dokumentation, triagering enligt RETTS, samt PDL-kompatibel auditloggning.
    features:
      - Patientidentitetshantering
      - RETTS-inspirerat triagesystem
      - PDL-kompatibel auditloggning
      - FHIR R4-stöd via HAPI FHIR
      - Modulär arkitektur med mikrotjänster
