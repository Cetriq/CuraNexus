developmentStatus: development
softwareType: standalone/web
description:
  sv:
    shortDescription: Modulär vårdgivandeplattform för svenska sjukvården med stöd för 100 000+ användare
    longDescription: CuraNexus är en processdriven vårdplattform som följer principen att vårdprocessen är primär och journalen är en biprodukt. Plattformen erbjuder patienthantering, vårdmöten, klinisk dokumentation, triagering, medicinska förskrivningar och fullständig spårbarhet enligt PDL-krav.
    features:
      - Personnummer-baserad patienthantering med skyddad identitet
      - RETTS-inspirerat triagesystem
      - FHIR R4-kompatibilitet med svenska tillägg
      - Fullständig revision och PDL-efterlevnad
      - Modulär arkitektur med händelsedriven kommunikation
