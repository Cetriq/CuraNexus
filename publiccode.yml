developmentStatus: development
softwareType: standalone/web
description:
  sv:
    shortDescription: Modulär svensk vårdgivarplattform för patienthantering och klinisk dokumentation
    longDescription: CuraNexus är en process-driven vårdplattform byggd för svenska vårdgivare. Systemet hanterar patientidentitet, vårdmöten, klinisk dokumentation, triagering och uppgiftshantering med stöd för FHIR R4 och PDL-kompatibel revision.
    features:
      - Patientidentitetshantering
      - Klinisk dokumentation och journalföring
      - RETTS-inspirerat triagesystem
      - FHIR R4-kompatibel API-gateway
      - PDL-kompatibel revisionsloggning
      - Arbetsflödes- och uppgiftshantering
      - RBAC och ABAC-auktorisering
