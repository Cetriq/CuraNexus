description:
  sv:
    shortDescription: Svensk vårdgivarlattform - modulärt, processtyrt vårdsystem designat för 100 000+ användare.
    longDescription: CuraNexus är en omfattande svensk vårdplattform som följer principen att vårdprocessen är primär och journalen en biprodukt. Systemet inkluderar patientidentitet, vårdmöten, klinisk dokumentation, triagering, bokning, remisser, läkemedelshantering, labbeställningar och certifikathantering.
    features:
      - FHIR R4-stöd med svenska tillägg
      - PDL-kompatibel revisionsloggning
      - RETTS-inspirerat triagesystem
      - Personnummer-baserad patienthantering
      - Modulär arkitektur med 18+ vårdmoduler
